{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Мониторинг активности</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .container { max-width: 500px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        .feedback { margin-top: 10px; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <header><h1>Регистрация нового пользователя</h1></header>
    <div class="container">
        <h2>Создайте аккаунт</h2>
        <form id="registration-form">
            <div class="form-group">
                <label for="username">Имя пользователя:</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="email">Электронная почта:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">Подтвердите пароль:</label>
                <input type="password" id="confirm-password" required>
            </div>
            <div class="form-group">
                <label for="department">Отдел:</label>
                <select id="department">
                    <option value="">Выберите отдел</option>
                    <option value="it">IT-отдел</option>
                    <option value="sales">Продажи</option>
                    <option value="hr">HR</option>
                </select>
            </div>
            <button type="submit">Зарегистрироваться</button>
            <div id="feedback" class="feedback" style="display:none;"></div>
        </form>
        <p>Уже есть аккаунт? <a href="{% url 'login' %}">Войдите здесь</a></p>
    </div>
    <footer><p>&copy; 2026 Система мониторинга активности сотрудников.</p></footer>

    <script>
        document.getElementById('registration-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            if (password !== confirm) {
                showFeedback('Пароли не совпадают', true);
                return;
            }
            const data = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: password,
                department: document.getElementById('department').value
            };
            try {
                const response = await fetch('/api/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    showFeedback('Регистрация прошла успешно!', false);
                    setTimeout(() => { window.location.href = '{% url "login" %}'; }, 1500);
                } else {
                    const err = await response.json();
                    showFeedback(err.detail || 'Ошибка регистрации', true);
                }
            } catch (err) {
                showFeedback('Ошибка сети', true);
            }
        });
        function showFeedback(msg, isError) {
            const fb = document.getElementById('feedback');
            fb.textContent = msg;
            fb.style.backgroundColor = isError ? '#f8d7da' : '#d4edda';
            fb.style.color = isError ? '#721c24' : '#155724';
            fb.style.display = 'block';
        }
    </script>
</body>
</html>

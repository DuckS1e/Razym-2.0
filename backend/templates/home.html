<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Мониторинг активности</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="icon" href="data:,">
    <style>
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .form-feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
        }
        .container {
            max-width: 500px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        footer {
            margin-top: 2rem;
            text-align: center;
        }
        header h1 {
            text-align: center;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Регистрация нового пользователя</h1>
    </header>

    <div class="container">
        <h2>Создайте аккаунт</h2>
        <form id="registration-form" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Имя пользователя:</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="email">Электронная почта:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Подтвердите пароль:</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>

            <div class="form-group">
                <label for="department">Отдел:</label>
                <select id="department" name="department" required>
                    <option value="">Выберите отдел</option>
                    <option value="it">IT-отдел</option>
                    <option value="sales">Продажи</option>
                    <option value="hr">HR</option>
                    <option value="finance">Финансы</option>
                    <option value="marketing">Маркетинг</option>
                </select>
            </div>

            <div id="form-feedback" class="form-feedback" style="display:none;"></div>

            <button id="submit-btn" type="submit">Зарегистрироваться</button>
        </form>

        <p>Уже есть аккаунт? <a href="{% url 'login' %}">Войдите здесь</a></p>
    </div>

    <footer>
        <p>&copy; 2026 Система мониторинга активности сотрудников. Все права защищены.</p>
    </footer>

    <script>
        (function() {
            const form = document.getElementById('registration-form');
            const submitBtn = document.getElementById('submit-btn');
            const feedback = document.getElementById('form-feedback');

            function showFeedback(message, isError = true) {
                feedback.style.display = 'block';
                feedback.textContent = message;
                feedback.style.backgroundColor = isError ? '#f8d7da' : '#d4edda';
                feedback.style.color = isError ? '#721c24' : '#155724';
                feedback.style.border = isError ? '1px solid #f5c6cb' : '1px solid #c3e6cb';
            }

            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const username = document.getElementById('username').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm-password').value;
                const department = document.getElementById('department').value;

                if (password !== confirmPassword) {
                    showFeedback('Пароли не совпадают.', true);
                    return;
                }
                if (!department) {
                    showFeedback('Пожалуйста, выберите отдел.', true);
                    return;
                }

                submitBtn.disabled = true;
                showFeedback('Отправка данных...', false);

                try {
                    const resp = await fetch('/api/register/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                        },
                        body: JSON.stringify({
                            username: username,
                            email: email,
                            password: password,
                            department: department
                        })
                    });

                    const data = await resp.json().catch(() => ({}));
                    if (!resp.ok) {
                        const msg = data.error || data.message || 'Ошибка регистрации. Попробуйте ещё раз.';
                        throw new Error(msg);
                    }

                    showFeedback('Регистрация прошла успешно!', false);
                    setTimeout(() => {
                        window.location.href = '{% url "login" %}';
                    }, 800);
                } catch (err) {
                    showFeedback(err.message || 'Не удалось выполнить регистрацию.', true);
                } finally {
                    submitBtn.disabled = false;
                }
            });
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему - Мониторинг активности</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <header>
        <h1>Вход в систему</h1>
    </header>
    
    <nav>
        <a href="/home/">На главную</a>
    </nav>

    <div class="container">
        <h2>Войдите в свой аккаунт</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Имя пользователя:</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="form-group">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Запомнить меня</label>
            </div>
            
            <button type="submit">Войти</button>
        </form>
        
        <p>Нет аккаунта? <a href="/hello/">Зарегистрируйтесь здесь</a></p>
        <p><a href="/reset-password/">Забыли пароль?</a></p>
    </div>

    <footer>
        <p>&copy; 2026 Система мониторинга активности сотрудников. Все права защищены.</p>
    </footer>

    <script src="../static/scrypt.js"></script>
</body>
</html>
